name: Build and Release WXT Extension

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    env:
      VITE_BACKEND_SERVER: ${{ secrets.VITE_BACKEND_SERVER }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Get package.json version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create .env file
        run: |
          echo "VITE_BACKEND_SERVER=$VITE_BACKEND_SERVER" >> .env

      - name: Install dependencies
        run: pnpm install

      - name: Build extension
        run: pnpm build

      - name: Zip Chrome release asset
        run: |
          cd .output/chrome-mv3  
          zip -r ../extension-${{ steps.version.outputs.tag }}-chrome.zip .

      - name: Zip Firefox release asset
        run: |
          pnpm build:firefox
          cd .output/firefox-mv2
          zip -r ../extension-${{ steps.version.outputs.tag }}-firefox.zip .

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            .output/extension-${{ steps.version.outputs.tag }}-chrome.zip
            .output/extension-${{ steps.version.outputs.tag }}-firefox.zip
          generate_release_notes: true
